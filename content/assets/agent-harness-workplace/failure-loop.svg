<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="788" viewBox="0 0 1400 788" role="img"><title>failure-loop.svg</title><defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" class="grid"/></pattern><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#cbd5e1"/></marker><filter id="glow"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><style>
.bg{fill:#050816}.grid{stroke:#1d2842;stroke-width:1;opacity:.55}.title{font:800 34px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f8fafc}.sub{font:500 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#94a3b8}.label{font:800 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#e2e8f0}.small{font:500 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#cbd5e1}.tiny{font:500 11px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#94a3b8}.note{font:700 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f8fafc}.box{stroke-width:2;rx:18;opacity:.92}.cyan{fill:#0e7490;stroke:#22d3ee}.green{fill:#047857;stroke:#34d399}.violet{fill:#6d28d9;stroke:#a78bfa}.amber{fill:#92400e;stroke:#fbbf24}.rose{fill:#9f1239;stroke:#fb7185}.slate{fill:#1e293b;stroke:#94a3b8}.arrow{stroke:#cbd5e1;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:8 7}.muted{opacity:.35}
</style><rect width="100%" height="100%" class="bg"/><rect width="100%" height="100%" fill="url(#grid)"/><text x="70" y="85" class="title">장기 실행 에이전트는 실패를 남겨야 한다</text><text x="70" y="120" class="sub">실패 로그가 없으면 다음 실행은 똑같이 틀린다</text><rect x="100" y="240" width="210" height="95" class="box slate"/><text x="150" y="297" class="label">Task</text><rect x="390" y="240" width="210" height="95" class="box cyan"/><text x="438" y="297" class="label">Run</text><rect x="680" y="240" width="210" height="95" class="box rose"/><text x="722" y="297" class="label">Failure</text><rect x="970" y="240" width="250" height="95" class="box green"/><text x="1012" y="297" class="label">Checkpoint</text><path d="M310 288 L390 288" class="arrow"/><path d="M600 288 L680 288" class="arrow"/><path d="M890 288 L970 288" class="arrow"/><path d="M1090 355 C970 540, 500 540, 495 355" class="arrow dash"/><text x="475" y="575" class="note">로그 · 중간 산출물 · 사람 개입 지점이 다음 실행의 컨텍스트가 된다</text></svg>