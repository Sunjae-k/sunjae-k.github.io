<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="788" viewBox="0 0 1400 788" role="img"><title>runtime-stack.svg</title><defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" class="grid"/></pattern><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#cbd5e1"/></marker><filter id="glow"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><style>
.bg{fill:#050816}.grid{stroke:#1d2842;stroke-width:1;opacity:.55}.title{font:800 34px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f8fafc}.sub{font:500 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#94a3b8}.label{font:800 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#e2e8f0}.small{font:500 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#cbd5e1}.tiny{font:500 11px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#94a3b8}.note{font:700 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f8fafc}.box{stroke-width:2;rx:18;opacity:.92}.cyan{fill:#0e7490;stroke:#22d3ee}.green{fill:#047857;stroke:#34d399}.violet{fill:#6d28d9;stroke:#a78bfa}.amber{fill:#92400e;stroke:#fbbf24}.rose{fill:#9f1239;stroke:#fb7185}.slate{fill:#1e293b;stroke:#94a3b8}.arrow{stroke:#cbd5e1;stroke-width:3;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:8 7}.muted{opacity:.35}
</style><rect width="100%" height="100%" class="bg"/><rect width="100%" height="100%" fill="url(#grid)"/><text x="70" y="85" class="title">에이전트 런타임은 여러 층이다</text><text x="70" y="120" class="sub">채팅창 하나로는 장기 실행 업무를 운영할 수 없다</text><rect x="220" y="185" width="960" height="70" class="box rose"/><text x="270" y="230" class="label">Governance / Permission</text><rect x="220" y="280" width="960" height="70" class="box amber"/><text x="270" y="325" class="label">Observability / Evaluation</text><rect x="220" y="375" width="960" height="70" class="box green"/><text x="270" y="420" class="label">Tools / Sandbox / Workspace</text><rect x="220" y="470" width="960" height="70" class="box cyan"/><text x="270" y="515" class="label">Memory / Checkpoint / Session Log</text><rect x="220" y="565" width="960" height="70" class="box violet"/><text x="270" y="610" class="label">Model</text></svg>