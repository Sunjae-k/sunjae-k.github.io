</style><rect width="100%" height="100%" class="bg"/><rect width="100%" height="100%" fill="url(#grid)"/><text x="70" y="95" class="title">RAG는 검색기가 아니라 파이프라인이다</text><text x="70" y="132" class="sub">답변 품질은 모델보다 문서가 깨지는 순간에 먼저 무너진다</text><rect x="105" y="245" width="230" height="100" class="box amber"/><text x="160" y="305" class="label">PDF / Table</text><rect x="430" y="245" width="230" height="100" class="box cyan"/><text x="490" y="305" class="label">Parsing</text><rect x="755" y="245" width="230" height="100" class="box green"/><text x="815" y="305" class="label">Retrieval</text><rect x="1080" y="245" width="230" height="100" class="box violet"/><text x="1145" y="305" class="label">Answer</text><path d="M335 295 L430 295" class="arrow"/><path d="M660 295 L755 295" class="arrow"/><path d="M985 295 L1080 295" class="arrow"/><text x="400" y="520" class="note">중간 구조가 사라지면, 마지막 답변만 바꿔서는 복구되지 않는다</text></svg>